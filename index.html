<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coffee Lab Pro - Recipe Master</title>
  <style>
    :root {
      --primary: #ffd166;
      --secondary: #06d6a0;
      --danger: #ef476f;
      --bg: #121820;
      --card-bg: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(0, 0, 0, 0.3);
    }
    body {
      margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
      background: linear-gradient(145deg, #121820, #232d39);
      font-family: 'Inter', -apple-system, sans-serif; color: white;
    }
    .card {
      background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      padding: 30px; border-radius: 32px; width: 380px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1); position: relative; overflow: hidden;
    }
    h1 { margin: 0 0 20px; font-size: 14px; text-align: center; letter-spacing: 4px; opacity: 0.5; font-weight: 400; }
    .method-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
    .method-option {
      background: var(--input-bg); border: 2px solid transparent; border-radius: 20px;
      padding: 15px; cursor: pointer; position: relative; transition: 0.3s;
      text-align: center; display: flex; flex-direction: column; align-items: center; min-height: 80px;
    }
    .method-option.active { border-color: var(--primary); background: rgba(255, 209, 102, 0.1); }
    .method-option.add-new { border: 2px dashed rgba(255, 255, 255, 0.2); background: none; opacity: 0.6; }
    .edit-icon { position: absolute; top: 10px; right: 10px; font-size: 14px; opacity: 0.4; padding: 5px; cursor: pointer; z-index: 5; }
    .setting-group { margin-bottom: 20px; }
    input[type="range"] { width: 100%; accent-color: var(--primary); cursor: pointer; margin: 0; }
    #time { font-size: 72px; text-align: center; margin: 10px 0; font-weight: 200; font-variant-numeric: tabular-nums; }
    #step-text { text-align: center; color: var(--primary); font-size: 18px; font-weight: 600; min-height: 1.5em; }
    .status-bar { display: flex; justify-content: space-between; background: var(--input-bg); padding: 18px; border-radius: 24px; margin-top: 15px; }
    .status-bar div strong { font-size: 22px; color: var(--secondary); font-variant-numeric: tabular-nums; }
    .memo-display { margin-top: 15px; padding: 12px 15px; background: rgba(255,255,255,0.03); border-radius: 12px; border-left: 3px solid var(--primary); font-size: 12px; line-height: 1.5; color: rgba(255,255,255,0.7); min-height: 40px; font-style: italic; }
    button#startBtn { width: 100%; padding: 20px; margin-top: 20px; border: none; border-radius: 50px; background: var(--primary); color: #121820; font-size: 18px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 25px rgba(255, 209, 102, 0.3); }
    #editor-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #161d27; z-index: 100; padding: 25px; box-sizing: border-box; display: none; overflow-y: auto; border-radius: 32px; }
    .edit-card { background: var(--input-bg); border-radius: 16px; padding: 15px; margin-bottom: 12px; }
    .edit-card-row { display: grid; grid-template-columns: 60px 1fr 40px; gap: 10px; margin-bottom: 10px; }
    .input-label { display: block; font-size: 10px; opacity: 0.5; margin-bottom: 5px; text-transform: uppercase; }
    input[type="text"], input[type="number"], textarea { background: var(--input-bg); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; font-family: inherit; }
    .btn-save { background: var(--secondary); color: #121820; width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-delete { color: var(--danger); width: 100%; padding: 12px; background: none; border: 1px solid var(--danger); border-radius: 12px; margin-top: 20px; cursor: pointer; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>BREW MASTER LAB</h1>
    <div id="method-grid" class="method-grid"></div>
    <div class="setting-group">
      <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; opacity: 0.7;">
        <span>COFFEE BEANS</span><strong id="beanVal" style="color:var(--primary)">20g</strong>
      </div>
      <input type="range" id="beans" min="5" max="50" step="1" value="20">
    </div>
    <div class="setting-group">
      <div style="display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; opacity: 0.7;">
        <span>TOTAL WATER</span><strong id="waterVal" style="color:var(--secondary)">300ml</strong>
      </div>
      <input type="range" id="water" min="50" max="800" step="10" value="300" style="accent-color: var(--secondary);">
    </div>
    <div id="time">00:00</div>
    <div id="step-text">Ready to Brew</div>
    <div class="status-bar">
      <div><span style="font-size:10px; opacity:0.5; display:block;">POUR</span><strong id="currentPour">0</strong><small>ml</small></div>
      <div><span style="font-size:10px; opacity:0.5; display:block;">TOTAL</span><strong id="totalPour">0</strong><small>ml</small></div>
    </div>
    <div id="memo-display" class="memo-display">Select a recipe...</div>
    <button id="startBtn">START BREW</button>

    <div id="editor-overlay">
      <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <h2 style="font-size: 18px; margin: 0;">Recipe Editor</h2>
        <button id="closeEditorBtn" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">×</button>
      </div>
      <div class="setting-group"><label class="input-label">Recipe Name</label><input type="text" id="edit-recipe-name"></div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
        <div><label class="input-label">Default Beans (g)</label><input type="number" id="edit-default-beans"></div>
        <div><label class="input-label">Default Water (ml)</label><input type="number" id="edit-default-water"></div>
      </div>
      <div class="setting-group"><label class="input-label">Memo</label><textarea id="edit-recipe-memo" rows="2"></textarea></div>
      <div id="edit-steps-container"></div>
      <button id="addStepBtn" style="background:rgba(255,255,255,0.1); color:white; width:100%; padding:12px; border-radius:12px; border:none; cursor:pointer; margin-bottom:10px;">+ Add Step</button>
      <button id="saveRecipeBtn" class="btn-save">SAVE RECIPE</button>
      <button id="deleteRecipeBtn" class="btn-delete">DELETE RECIPE</button>
    </div>
  </div>

  <script>
    (() => {
      const defaultRecipes = {
        '46method': { name: '4:6 Method', icon: '⚖️', defaultBeans: 20, defaultWater: 300, memo: 'Sweetness vs Acidity balance.', steps: [{ t: 0, txt: '1st Bloom', v: 60 }, { t: 45, txt: '2nd Pour', v: 60 }, { t: 90, txt: '3rd Pour', v: 60 }, { t: 135, txt: '4th Pour', v: 60 }, { t: 180, txt: '5th Pour', v: 60 }, { t: 230, txt: 'Finish', v: 0 }] },
        'v60': { name: 'V60 Std.', icon: '☕', defaultBeans: 15, defaultWater: 240, memo: 'Clean and bright cup.', steps: [{ t: 0, txt: 'Bloom', v: 40 }, { t: 40, txt: 'Main Pour', v: 100 }, { t: 90, txt: 'Final Pour', v: 100 }, { t: 150, txt: 'Enjoy', v: 0 }] }
      };

      let recipes = JSON.parse(localStorage.getItem('customRecipesV6')) || defaultRecipes;
      let currentKey = Object.keys(recipes)[0];
      let editingKey = '';
      let timer = null;
      let audioCtx = null;

      const dom = {
        grid: document.getElementById('method-grid'),
        beans: document.getElementById('beans'),
        water: document.getElementById('water'),
        beanVal: document.getElementById('beanVal'),
        waterVal: document.getElementById('waterVal'),
        time: document.getElementById('time'),
        stepText: document.getElementById('step-text'),
        currentPour: document.getElementById('currentPour'),
        totalPour: document.getElementById('totalPour'),
        memo: document.getElementById('memo-display'),
        startBtn: document.getElementById('startBtn'),
        editor: document.getElementById('editor-overlay'),
        stepsContainer: document.getElementById('edit-steps-container')
      };

      function updateUI() {
        dom.grid.innerHTML = '';
        Object.keys(recipes).forEach(key => {
          const item = recipes[key];
          const div = document.createElement('div');
          div.className = `method-option ${key === currentKey ? 'active' : ''}`;
          
          const editIcon = document.createElement('span');
          editIcon.className = 'edit-icon';
          editIcon.textContent = '✎';
          editIcon.onclick = (e) => { e.stopPropagation(); openEditor(key); };

          const iconDiv = document.createElement('div');
          iconDiv.style.fontSize = '24px';
          iconDiv.textContent = item.icon || '☕';

          const nameDiv = document.createElement('div');
          nameDiv.style.fontSize = '10px';
          nameDiv.style.fontWeight = '800';
          nameDiv.textContent = item.name.toUpperCase();

          div.append(editIcon, iconDiv, nameDiv);
          div.onclick = () => selectMethod(key);
          dom.grid.appendChild(div);
        });

        const addBtn = document.createElement('div');
        addBtn.className = 'method-option add-new';
        addBtn.innerHTML = '<div style="font-size:24px">+</div><div style="font-size:10px; font-weight:bold;">NEW</div>';
        addBtn.onclick = addNewRecipe;
        dom.grid.appendChild(addBtn);
        
        applySettings(currentKey);
      }

      function selectMethod(key) {
        currentKey = key;
        updateUI();
      }

      function applySettings(key) {
        const r = recipes[key];
        dom.beans.value = r.defaultBeans;
        dom.water.value = r.defaultWater;
        dom.memo.textContent = r.memo || 'No notes.';
        syncValues();
      }

      function syncValues() {
        dom.beanVal.textContent = dom.beans.value + 'g';
        dom.waterVal.textContent = dom.water.value + 'ml';
      }

      function openEditor(key) {
        editingKey = key;
        const r = recipes[key];
        document.getElementById('edit-recipe-name').value = r.name;
        document.getElementById('edit-default-beans').value = r.defaultBeans;
        document.getElementById('edit-default-water').value = r.defaultWater;
        document.getElementById('edit-recipe-memo').value = r.memo || '';
        dom.stepsContainer.innerHTML = '';
        r.steps.forEach(s => addStepRow(s.t, s.txt, s.v));
        dom.editor.style.display = 'block';
      }

      function addStepRow(t = 0, txt = 'Step', v = 0) {
        const div = document.createElement('div');
        div.className = 'edit-card';
        div.innerHTML = `
          <div class="edit-card-row">
            <div><label class="input-label">Sec</label><input type="number" class="step-t" value="${t}"></div>
            <div><label class="input-label">Label</label><input type="text" class="step-txt" value="${txt}"></div>
            <button class="remove-step" style="background:none; border:none; color:white; font-size:20px; cursor:pointer; margin-top:10px;">×</button>
          </div>
          <div><label class="input-label">Pour (ml)</label><input type="number" class="step-v" value="${v}" style="color:var(--secondary); font-weight:bold;"></div>
        `;
        div.querySelector('.remove-step').onclick = () => div.remove();
        dom.stepsContainer.appendChild(div);
      }

      function saveRecipe() {
        const name = document.getElementById('edit-recipe-name').value || 'New Recipe';
        recipes[editingKey] = {
          name,
          defaultBeans: parseInt(document.getElementById('edit-default-beans').value) || 0,
          defaultWater: parseInt(document.getElementById('edit-default-water').value) || 0,
          memo: document.getElementById('edit-recipe-memo').value,
          icon: recipes[editingKey].icon || '☕',
          steps: Array.from(dom.stepsContainer.querySelectorAll('.edit-card')).map(el => ({
            t: parseInt(el.querySelector('.step-t').value) || 0,
            txt: el.querySelector('.step-txt').value || 'Pour',
            v: parseInt(el.querySelector('.step-v').value) || 0
          }))
        };
        localStorage.setItem('customRecipesV6', JSON.stringify(recipes));
        dom.editor.style.display = 'none';
        updateUI();
      }

      function addNewRecipe() {
        const id = 'r_' + Date.now();
        recipes[id] = { name: 'New Recipe', icon: '☕', defaultBeans: 20, defaultWater: 300, steps: [{ t: 0, txt: 'Bloom', v: 50 }] };
        currentKey = id;
        openEditor(id);
      }

      function startBrewing() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const steps = recipes[currentKey].steps;
        dom.startBtn.disabled = true;
        dom.startBtn.style.opacity = 0.5;
        
        let index = -1;
        let totalPoured = 0;
        const startTime = Date.now();

        clearInterval(timer);
        timer = setInterval(() => {
          const elapsed = Math.floor((Date.now() - startTime) / 1000);
          const m = Math.floor(elapsed / 60);
          const s = elapsed % 60;
          dom.time.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

          if (index < steps.length - 1 && elapsed >= steps[index + 1].t) {
            index++;
            const currentStep = steps[index];
            totalPoured += currentStep.v;
            dom.stepText.textContent = currentStep.txt;
            dom.currentPour.textContent = currentStep.v;
            dom.totalPour.textContent = totalPoured;
            
            // Beep
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);

            if (index === steps.length - 1 || currentStep.v === 0) {
              clearInterval(timer);
              dom.startBtn.disabled = false;
              dom.startBtn.style.opacity = 1;
              dom.stepText.textContent = "Enjoy your coffee!";
            }
          }
        }, 100);
      }

      // Listeners
      dom.beans.oninput = syncValues;
      dom.water.oninput = syncValues;
      dom.startBtn.onclick = startBrewing;
      document.getElementById('addStepBtn').onclick = () => addStepRow();
      document.getElementById('saveRecipeBtn').onclick = saveRecipe;
      document.getElementById('closeEditorBtn').onclick = () => dom.editor.style.display = 'none';
      document.getElementById('deleteRecipeBtn').onclick = () => {
        if (confirm('Delete recipe?')) {
          delete recipes[editingKey];
          localStorage.setItem('customRecipesV6', JSON.stringify(recipes));
          currentKey = Object.keys(recipes)[0];
          dom.editor.style.display = 'none';
          updateUI();
        }
      };

      updateUI();
    })();
  </script>
</body>
</html>
